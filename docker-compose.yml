name: observatory

services:
  prometheus:
    image: docker.io/prom/prometheus:v3.2.0
    container_name: observatory-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus-data:/prometheus:Z
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - observatory

  grafana:
    image: docker.io/grafana/grafana-oss:11.5.0
    container_name: observatory-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
      - grafana-data:/var/lib/grafana:Z
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - observatory
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started

  jaeger:
    image: docker.io/jaegertracing/jaeger:2.2.0
    container_name: observatory-jaeger
    command:
      - --set
      - receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317
      - --set
      - receivers.otlp.protocols.http.endpoint=0.0.0.0:4318
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"
      - "127.0.0.1:${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - observatory

  stellar-forge:
    build: ./example/stellar-forge
    container_name: observatory-stellar-forge
    environment:
      NODE_ENV: production
      PORT: "8080"
      JAEGER_OTLP_URL: http://jaeger:4318/v1/traces
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - observatory
    depends_on:
      jaeger:
        condition: service_started

volumes:
  prometheus-data:
  grafana-data:

networks:
  observatory:
    driver: bridge
