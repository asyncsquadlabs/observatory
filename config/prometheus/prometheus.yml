global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "jaeger"
    static_configs:
      - targets: ["observatory-jaeger:16686"]
    metrics_path: "/metrics"

  - job_name: "grafana"
    static_configs:
      - targets: ["observatory-grafana:3000"]
    metrics_path: "/metrics"

  # Example: stellar-forge demo app
  - job_name: "stellar-forge"
    static_configs:
      - targets: ["stellar-forge:8080"]
    metrics_path: "/metrics"
