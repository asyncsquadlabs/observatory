apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://observatory-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://observatory-jaeger:16686
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: ""
      nodeGraph:
        enabled: true
